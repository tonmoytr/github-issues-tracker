<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TR Github Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header>
      <div class="navbar bg-base-100 shadow-sm px-20">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">daisyUI</a>
        </div>
        <div class="flex gap-2">
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            </div>

            <input
              type="text"
              id="search"
              class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-github-purple focus:border-github-purple sm:text-sm"
              placeholder="Search or jump to..."
            />
          </div>
          <button
            id="btn-search"
            class="ms-2 me-6 bg-blue-600 text-white font-md text-lg px-4 py-1 rounded hover:bg-blue-700"
          >
            Search
          </button>
        </div>
      </div>
    </header>
    <main class="bg-slate-100 min-h-screen p-10">
      <section
        class="bg-white container mx-auto p-6 rounded-lg shadow-sm border border-gray-200 flex gap-3"
      >
        <button
          id="all"
          class="bg-[#4F11FF] text-white px-10 py-2 rounded-md font-medium text-sm transition-colors"
        >
          All
        </button>

        <button
          id="open"
          class="bg-white text-slate-600 border border-gray-200 px-10 py-2 rounded-md font-medium text-sm hover:bg-gray-50 transition-colors"
        >
          Open
        </button>

        <button
          id="closed"
          class="bg-white text-slate-600 border border-gray-200 px-10 py-2 rounded-md font-medium text-sm hover:bg-gray-50 transition-colors"
        >
          Closed
        </button>
      </section>

      <div
        id="issue-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-8"
      ></div>
      <section
        class="bg-white container mx-auto mt-8 p-6 rounded-t-lg shadow-sm border-gray-200 flex justify-between items-center"
      >
        <div class="flex gap-5 items-center justify-center">
          <img
            src="./assets/Aperture.png"
            alt="aperture logo"
            class="w-10 h-10"
          />
          <div>
            <h3 id="issue-count" class="text-2xl font-semibold"></h3>
            <p>Track and manage your project Issues</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <span class="h-3 w-3 bg-green-600 rounded-full"></span>
            <span class="text-slate-700 font-medium text-sm">Open</span>
          </div>

          <div class="flex items-center gap-2">
            <span class="h-3 w-3 bg-purple-600 rounded-full"></span>
            <span class="text-slate-700 font-medium text-sm">Closed</span>
          </div>
        </div>
      </section>
      <section
        id="issues-container"
        class="bg-slate-5550 container mx-auto mt-1 p-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4"
      ></section>
    </main>
    <!-- Scripts -->
    <script src="./scripts/issues.js"></script>
    <script src="./scripts/tabs.js"></script>
  </body>
</html>
