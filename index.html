<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TR Github Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <section
      class="bg-white p-8 rounded-lg shadow-md border border-gray-200 w-full max-w-lg"
    >
      <div class="text-center mb-8">
        <img
          src="./assets/github-logo.png"
          alt="github logo"
          class="mx-auto mb-4"
        />
        <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
        <p class="text-sm text-gray-600 mt-1">Sign in to manage your issues</p>
      </div>

      <form id="loginForm">
        <div class="mb-4">
          <label for="username" class="block text-sm font-medium mb-1"
            >Username</label
          >
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter Your Username"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-github-purple focus:border-github-purple text-sm"
          />
          <p class="text-xs text-github-purple mt-1 text-blue-600">
            Default: admin
          </p>
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-medium mb-1"
            >Password</label
          >
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter Password"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-github-purple focus:border-github-purple text-sm"
          />
          <p class="text-xs text-github-purple mt-1 text-blue-600">
            Default: admin123
          </p>
        </div>

        <p
          id="errorMessage"
          class="text-red-600 text-sm mb-4 text-center hidden"
        >
          Invalid username or password.
        </p>

        <button
          type="submit"
          class="w-full bg-[#4A00FF] text-white font-semibold py-2 px-4 rounded-md text-sm hover:bg-black hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-github-purple focus:ring-offset-2"
        >
          Sign In
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center" aria-hidden="true">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center">
          <span class="bg-white px-2 text-sm text-gray-500">OR</span>
        </div>
      </div>

      <div class="bg-gray-50 p-4 rounded-md border border-gray-200">
        <p class="text-sm text-gray-600 text-center mb-2">Demo Credentials:</p>
        <div class="text-sm text-gray-700 space-y-1">
          <p><span class="font-semibold">Username:</span> admin</p>
          <p>
            <span class="font-semibold">Password:</span>
            admin123
          </p>
        </div>
      </div>
    </section>

    
    <script src="./scripts/login.js"></script>
  </body>
</html>
